<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shall we play a game?</title>
    <link rel="icon" href="/img/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <style>
      @import url("https://fonts.googleapis.com/css?family=Source+Code+Pro:400,700,300");

      :root {
        --mctf-bg: #13242b;
        --mctf-cyan: #21b4ba;
        --mctf-cyan-light: #cff8fa;
        --mctf-yellow: #ead44d;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        font-family: "Source Code Pro", Courier, monospace;
        color: var(--mctf-cyan-light);
        background: radial-gradient(circle at 20% 10%, rgba(33, 180, 186, 0.15), transparent 35%), radial-gradient(circle at 85% 90%, rgba(234, 212, 77, 0.08), transparent 45%), var(--mctf-bg);
        display: grid;
        place-items: center;
        padding: 1.25rem;
      }

      .panel {
        width: min(900px, 100%);
        border: 1px solid var(--mctf-cyan);
        border-radius: 8px;
        padding: 1.25rem;
        background: rgba(7, 19, 23, 0.88);
        box-shadow:
          0 0 10px rgba(33, 180, 186, 0.45),
          0 0 28px rgba(33, 180, 186, 0.24);
      }

      .world-map-wrap {
        position: relative;
        height: clamp(170px, 28vw, 260px);
        border: 1px solid var(--mctf-cyan);
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 1rem;
        background: #0a161a;
        box-shadow:
          inset 0 0 16px rgba(33, 180, 186, 0.35),
          0 0 20px rgba(33, 180, 186, 0.35);
        isolation: isolate;
      }

      .world-map-wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        background: url("/img/bg--world.png") center top no-repeat;
        background-size: auto 95%;
        opacity: 0.92;
        filter: brightness(1.28) contrast(1.12);
        z-index: 1;
      }

      .world-map-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: linear-gradient(rgba(33, 180, 186, 0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(33, 180, 186, 0.15) 1px, transparent 1px);
        background-size: 28px 28px;
        z-index: 2;
      }

      .map-dots {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        -webkit-mask-image: url("/img/bg--world.png");
        -webkit-mask-repeat: no-repeat;
        -webkit-mask-position: center top;
        -webkit-mask-size: auto 95%;
        mask-image: url("/img/bg--world.png");
        mask-repeat: no-repeat;
        mask-position: center top;
        mask-size: auto 95%;
      }

      .map-dot {
        position: absolute;
        width: 10px;
        height: 10px;
        background: #ff2b2b;
        clip-path: polygon(50% 0, 0 100%, 100% 100%);
        box-shadow:
          0 0 8px rgba(255, 43, 43, 0.8),
          0 0 16px rgba(255, 43, 43, 0.6);
        animation: pulse-red 3.8s ease-in-out infinite;
      }

      .title {
        position: relative;
        display: inline-block;
        font-size: clamp(1.8rem, 5vw, 3rem);
        line-height: 1.1;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--mctf-cyan-light);
        margin-bottom: 0.4rem;
      }

      .title::before,
      .title::after {
        content: attr(data-text);
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        clip: rect(0, 0, 0, 0);
      }

      .title::before {
        left: -2px;
        text-shadow: 2px 0 #000;
        animation: glitch-anim-2 3s infinite linear alternate-reverse;
      }

      .title::after {
        left: 2px;
        text-shadow: -1px 0 var(--mctf-cyan);
        animation: glitch-anim-1 2s infinite linear alternate-reverse;
      }

      .cursor {
        display: inline-block;
        width: 0.6em;
        height: 1em;
        margin-left: 0.2em;
        vertical-align: text-bottom;
        background: var(--mctf-cyan);
        animation: blink 1s step-end infinite;
      }

      .sub {
        margin-bottom: 1rem;
        color: var(--mctf-cyan);
      }

      .subscribe-form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.6rem;
      }

      .subscribe-form input {
        min-width: 80px;
        background: transparent;
        border: 1px solid var(--mctf-cyan);
        border-radius: 4px;
        color: var(--mctf-cyan-light);
        padding: 10px;
        font-size: 14px;
        font-family: "Source Code Pro", Courier, monospace;
      }

      .subscribe-form button {
        border: 1px solid var(--mctf-yellow);
        background: transparent;
        color: var(--mctf-yellow);
        border-radius: 4px;
        padding: 10px 16px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 700;
        cursor: pointer;
        font-family: "Source Code Pro", Courier, monospace;
      }

      .subscribe-form button:hover {
        background: var(--mctf-yellow);
        color: var(--mctf-bg);
      }

      @media (max-width: 640px) {
        .subscribe-form {
          grid-template-columns: 1fr;
        }
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      @keyframes glitch-anim-1 {
        0% {
          clip: rect(49px, 820px, 79px, 0);
        }
        20% {
          clip: rect(8px, 820px, 20px, 0);
        }
        40% {
          clip: rect(79px, 820px, 53px, 0);
        }
        60% {
          clip: rect(2px, 820px, 109px, 0);
        }
        80% {
          clip: rect(100px, 820px, 113px, 0);
        }
        100% {
          clip: rect(33px, 820px, 6px, 0);
        }
      }

      @keyframes glitch-anim-2 {
        0% {
          clip: rect(93px, 820px, 108px, 0);
        }
        20% {
          clip: rect(11px, 820px, 110px, 0);
        }
        40% {
          clip: rect(79px, 820px, 2px, 0);
        }
        60% {
          clip: rect(52px, 820px, 15px, 0);
        }
        80% {
          clip: rect(36px, 820px, 42px, 0);
        }
        100% {
          clip: rect(57px, 820px, 84px, 0);
        }
      }

      @keyframes pulse-red {
        0%,
        100% {
          opacity: 0.25;
          transform: scale(0.7);
        }
        50% {
          opacity: 0.85;
          transform: scale(1.25);
        }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="world-map-wrap" aria-hidden="true">
        <div class="map-dots" id="mapDots"></div>
      </div>

      <h1 class="title" data-text="SHALL WE PLAY A GAME?">
        SHALL WE PLAY A GAME?
        <span class="cursor"></span>
      </h1>
      <p class="sub">Subscribe to the MapCTF mailing list for launch updates.</p>

      <script async src="https://subscribe-forms.beehiiv.com/embed.js"></script>
      <iframe src="https://subscribe-forms.beehiiv.com/cbe18fa2-3de0-45c3-9b62-aed015d85399" class="beehiiv-embed" data-test-id="beehiiv-embed" frameborder="0" scrolling="no" style="width: 100%; height: 87px; margin: 0; border-radius: 0px 0px 0px 0px !important; background-color: transparent; box-shadow: 0 0 #0000; max-width: 100%"></iframe>
    </main>
    <script>
      const mapDots = document.getElementById("mapDots");
      const dotCount = 16;

      function randomRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      function placeDot(dot) {
        dot.style.left = `${randomRange(0, 100)}%`;
        dot.style.top = `${randomRange(0, 100)}%`;
      }

      function spawnDot() {
        const dot = document.createElement("span");
        dot.className = "map-dot";
        dot.style.animationDelay = `${Math.random() * 4}s`;
        dot.style.animationDuration = `${randomRange(3.2, 5.4)}s`;
        placeDot(dot);
        mapDots.appendChild(dot);

        const moveDot = () => {
          placeDot(dot);
          setTimeout(moveDot, randomRange(3200, 6400));
        };
        setTimeout(moveDot, randomRange(3200, 6400));
      }

      for (let i = 0; i < dotCount; i += 1) {
        spawnDot();
      }
    </script>
  </body>
</html>
