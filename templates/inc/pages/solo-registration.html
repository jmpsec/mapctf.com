<main role="main" class="mctf-main page--solo-registration dashed-background full-height mctf-scroll">
  <header class="mctf-section-header mctf-container">
    <h1 class="mctf-glitch" data-text="Solo Registration">Solo Registration</h1>
    <p class="inner-container">Register to play Capture The Flag here. Once you have registered, simply login for future site visits.</p>
  </header>

  <div class="mctf-registration">
    <form class="mctf-form">
      <fieldset class="form-set mctf-container container--small">
        <div class="form-el el--text">
          <label for="">Name</label>
          <input type="text" />
        </div>
        <div class="form-el el--text">
          <label for="">Alias</label>
          <input type="text" />
        </div>
        <div class="form-el el--text">
          <label for="">Email</label>
          <input type="email" />
        </div>
        <div class="form-el el--text">
          <label for="">Team Name</label>
          <input type="text" />
        </div>
        <div class="form-el el--text">
          <label for="">Password</label>
          <input type="password" />
        </div>
      </fieldset>

      <div class="mctf-choose-emblem">
        <h6>Choose an Emblem</h6>

        <div class="emblem-carousel"></div>
        <!-- .emblem-carousel -->
      </div>

      <div class="form-el--actions mctf-container container--small">
        <p><a href="mailto:?to=&body=Test your skills with a friendly game of Capture the Flag. Click the link below to register.&subject=Invitation: <SCHOOL NAME HERE> CTF" class="alt-link">Invite a friend</a></p>
        <p><button class="mctf-cta cta--yellow" type="submit">Sign Up</button></p>
      </div>
    </form>
  </div>
  <!-- .mctf-registration -->
</main>
<!-- .mctf-main -->
