<div class="mctf-row-container full-height mctf-scroll">
  <main role="main" class="mctf-main page--game-status row-fluid no-shrink center-vertically mctf-img-glitch">
    <div class="mctf-container mctf-centered-main">
      <h3 class="title-lead">Upcoming Game</h3>
      <h1 class="mctf-glitch" data-text="July 30, 2015">July 30, 2015</h1>

      <ul class="upcoming-game-countdown">
        <li>
          <span class="count-number">03</span>
          _days
        </li>
        <li>
          <span class="count-number">06</span>
          _hours
        </li>
        <li>
          <span class="count-number">20</span>
          _minutes
        </li>
        <li>
          <span class="count-number">39</span>
          _seconds
        </li>
      </ul>

      <form class="mctf-form inner-container">
        <p>Please wait for your CTF competition to commence. Unitl then, stay informed and sign up for our newsletter!</p>

        <fieldset class="form-set">
          <div class="form-el el--text el--single">
            <label for="">Email</label>
            <input type="email" />
          </div>
        </fieldset>

        <div class="form-el--actions">
          <button class="mctf-cta cta--yellow" type="submit">Sign Up</button>
        </div>
      </form>
    </div>
  </main>
  <!-- .mctf-main -->

  <footer class="mctf-page-footer row-fixed" id="mctf-page-footer"></footer>
  <!-- .mctf-page-footer -->
</div>
