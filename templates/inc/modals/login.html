<div class="mctf-modal-content">
  <div class="modal-title">
    <h4>_login</h4>
    <a href="#" class="js-close-modal">
      <svg class="icon icon--close"><use xlink:href="#icon--close" /></svg>
    </a>
  </div>

  <header class="mctf-section-header">
    <h2>Welcome</h2>
    <p>Please login here. If you have not registered, you may do so by clicking "Sign Up" below.</p>
  </header>

  <form class="mctf-form">
    <fieldset class="form-set">
      <div class="form-el el--text">
        <label for="">Username</label>
        <input type="text" />
      </div>
      <div class="form-el el--text">
        <label for="">Password</label>
        <input type="password" />
      </div>
    </fieldset>

    <fieldset class="form-set">
      <div class="form-el el--radio">
        <input type="checkbox" id="mctf--remember-me" />
        <label for="mctf--remember-me">Remember_me</label>

        <div class="el--helper">
          <a href="#" class="alt-link js-launch-modal" data-modal="forgot-login-password">Forgot username / password</a>
        </div>
      </div>
    </fieldset>

    <div class="form-el--actions">
      <button class="mctf-cta cta--yellow" type="submit">Login</button>
      &nbsp;&nbsp;- or -&nbsp;&nbsp;
      <a href="#" class="mctf-cta cta--light-blue">
        <svg class="icon icon--social-facebook"><use xlink:href="#icon--social-facebook" /></svg>
        Log in
      </a>
    </div>

    <div class="form-el--footer">
      <a href="#solo-registration">Sign Up</a>
    </div>
  </form>
</div>
